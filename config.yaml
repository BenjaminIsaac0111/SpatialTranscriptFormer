# SpatialTranscriptFormer Project Configuration
# This file stores global defaults for data paths and training parameters.

# Data Paths
# Candidates for the HEST data directory (checked in order)
data_dirs:
  - "A:\\hest_data"

# Training Defaults
training:
  num_genes: 1000
  batch_size: 8
  learning_rate: 0.0001
  output_dir: "./checkpoints"
  
# MSigDB Pathway Settings
pathways:
  default_collection: "hallmarks"
  cache_dir: ".cache"
